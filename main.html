<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomedical Preprint Digest</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --text-color: #1a202c;
            --text-muted: #4a5568;
            --accent-color: #0284c7;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
            --font-serif: "Georgia", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-sans); line-height: 1.6; }

        /* Top Academic Navigation Bar */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700; color: #0f172a; }
        .meta-tag { font-size: 0.8rem; background: #e0f2fe; color: var(--accent-color); padding: 4px 12px; border-radius: 9999px; font-weight: 600; }

        /* Two-Column Responsive Dashboard */
        .dashboard-layout {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 32px;
        }

        /* Sticky Left Sidebar */
        aside {
            position: sticky;
            top: 100px;
            height: fit-content;
        }
        .sidebar-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }
        .sidebar-card h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; }
        .filter-btn { display: block; width: 100%; text-align: left; padding: 6px 8px; margin: 4px 0; background: none; border: none; font-size: 0.9rem; color: #475569; border-radius: 4px; cursor: pointer; }
        .filter-btn:hover { background: #f1f5f9; color: var(--accent-color); }

        /* Feed Card Processing Engine Styles */
        #dynamic-feed-container h3 {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            margin-top: 32px;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        #dynamic-feed-container h3:first-of-type { margin-top: 0; }
        #dynamic-feed-container h3 a { color: #0f172a; text-decoration: none; }
        #dynamic-feed-container h3 a:hover { color: var(--accent-color); text-decoration: underline; }

        /* Style categories injected by n8n */
        #dynamic-feed-container p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 500;
        }

        /* Restructure the lists into elegant clean white paper containers */
        #dynamic-feed-container ul {
            list-style: none;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.02), 0 1px 2px 0 rgba(0, 0, 0, 0.01);
        }
        #dynamic-feed-container ul li {
            margin-bottom: 16px;
            font-size: 0.95rem;
            color: #334155;
        }
        #dynamic-feed-container ul li:last-child { margin-bottom: 0; }
        #dynamic-feed-container strong { color: #0f172a; font-weight: 600; }

        .status-msg { text-align: center; padding: 40px; color: var(--text-muted); font-style: italic; }

        @media (max-width: 768px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            aside { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Biomedical Literature Feed</h1>
            <span class="meta-tag">🔄 Daily Update</span>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside>
            <div class="sidebar-card">
                <h3>Quick Navigation</h3>
                <button class="filter-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">📄 Top Articles</button>
                <button class="filter-btn" onclick="window.open('/feed', '_blank')">🛠️ View Raw Data</button>
            </div>
        </aside>

        <main>
            <div id="dynamic-feed-container">
                <p class="status-msg">Streaming academic updates safely...</p>
            </div>
        </main>
    </div>

    <script>
        async function loadDataFeed() {
            const container = document.getElementById('dynamic-feed-container');
            try {
                // Fetch from the custom /feed proxy route pointing cleanly to index.html
                const response = await fetch('/feed');
                if (!response.ok) throw new Error('Data target unreadable');
                
                const rawContent = await response.text();
                container.innerHTML = rawContent;
                
                // Polish step: Ensure links don't break reader context
                container.querySelectorAll('a').forEach(link => {
                    link.setAttribute('target', '_blank');
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="status-msg" style="color: #ef4444;">⚠️ Layout engine adjustment needed. Ensure files are correctly synced.</p>`;
            }
        }
        window.addEventListener('DOMContentLoaded', loadDataFeed);
    </script>
</body>
</html>
